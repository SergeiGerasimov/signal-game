<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Этап 3: Финальная Настройка</title>
    <style>
        body {
            margin: 0;
            background-color: #050509;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px);
            background-size: 550px 550px, 350px 350px;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 500px;
        }

        .hud {
            width: 100%;
            margin-bottom: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border: 1px solid #333;
            box-sizing: border-box;
            text-align: center;
        }

        .bar-wrapper {
            width: 100%;
            height: 12px;
            border: 1px solid #00ffcc;
            background: rgba(0, 255, 204, 0.1);
            margin-top: 8px;
            border-radius: 6px;
            overflow: hidden;
        }

        #progress {
            height: 100%;
            width: 0%;
            background: #00ffcc;
            box-shadow: 0 0 15px #00ffcc;
            transition: width 0.1s linear;
        }

        canvas {
            border: 2px solid #333;
            background: radial-gradient(circle, rgba(26, 26, 46, 0.8) 0%, rgba(11, 14, 20, 0.9) 100%);
            cursor: crosshair;
            border-radius: 4px;
        }

        #overlay {
            position: absolute;
            top: 52px; /* Подстройка под высоту HUD */
            left: 0;
            width: 500px;
            height: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.9);
            z-index: 10;
            text-align: center;
            border-radius: 0 0 4px 4px;
        }

        button {
            padding: 15px 35px;
            font-size: 1.1rem;
            font-family: 'Courier New', Courier, monospace;
            background: transparent;
            color: #00ffcc;
            border: 2px solid #00ffcc;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 20px;
            letter-spacing: 2px;
            font-weight: bold;
        }

        button:hover {
            background: #00ffcc;
            color: #050509;
            box-shadow: 0 0 25px #00ffcc;
        }

        .hidden { display: none !important; }
        
        .victory-text {
            color: white;
            font-size: 0.9rem;
            line-height: 1.5;
            margin: 15px 0;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="hud">
        <div id="status-text">СИСТЕМА: ГОТОВНОСТЬ</div>
        <div class="bar-wrapper">
            <div id="progress"></div>
        </div>
    </div>

    <canvas id="stabilizerCanvas" width="500" height="500"></canvas>

    <div id="overlay">
        <div id="start-content">
            <h2 style="color: #00ffcc;">ЭТАП 3:<br>СТАБИЛИЗАЦИЯ</h2>
            <p style="color: #888; font-size: 0.8rem;">Поймайте сигнал спутника и удерживайте его</p>
            <button id="start-btn">ЗАПУСК</button>
        </div>
        
        <div id="victory-content" class="hidden">
            <h2 style="color: #FFD700;">МИССИЯ ВЫПОЛНЕНА!</h2>
            <div class="victory-text">
                Ты прошел все этапы настройки!<br>
                Связь восстановлена на 100%.<br>
                <strong>Пора переходить к финалу!</strong>
            </div>
            <button id="restart-btn">ИГРАТЬ СНОВА</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('stabilizerCanvas');
    const ctx = canvas.getContext('2d');
    const progressBar = document.getElementById('progress');
    const statusText = document.getElementById('status-text');
    const overlay = document.getElementById('overlay');
    
    const startContent = document.getElementById('start-content');
    const victoryContent = document.getElementById('victory-content');
    
    const startBtn = document.getElementById('start-btn');
    const restartBtn = document.getElementById('restart-btn');

    let progress = 0;
    let isWon = false;
    let gameActive = false;

    // Спутник
    const satelliteImg = new Image();
    satelliteImg.src = 'satellite.png'; 

    const signal = {
        x: 250, y: 250, targetX: 250, targetY: 250,
        baseRadius: 45, currentRadius: 45, pulseTimer: 0
    };

    const mouse = { x: 250, y: 250 };

    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
    });

    // Управление кнопками
    startBtn.onclick = startGame;
    restartBtn.onclick = resetGame;

    function startGame() {
        overlay.classList.add('hidden');
        gameActive = true;
        isWon = false;
        progress = 0;
        update();
    }

    function resetGame() {
        victoryContent.classList.add('hidden');
        startContent.classList.remove('hidden');
        statusText.innerText = "СИСТЕМА: ГОТОВНОСТЬ";
        progressBar.style.width = "0%";
        progress = 0;
        signal.x = 250; signal.y = 250;
        signal.targetX = 250; signal.targetY = 250;
    }

    function updateSignal() {
        if (Math.random() > 0.92) {
            signal.targetX += (Math.random() - 0.5) * 380;
            signal.targetY += (Math.random() - 0.5) * 380;
        }
        const margin = 70;
        signal.targetX = Math.max(margin, Math.min(canvas.width - margin, signal.targetX));
        signal.targetY = Math.max(margin, Math.min(canvas.height - margin, signal.targetY));

        signal.x += (signal.targetX - signal.x) * 0.055; 
        signal.y += (signal.targetY - signal.y) * 0.055;

        signal.pulseTimer += 0.08;
        signal.currentRadius = signal.baseRadius + Math.sin(signal.pulseTimer) * 6;
    }

    function drawStar(cx, cy, spikes, outerRadius, innerRadius) {
        let rot = Math.PI / 2 * 3;
        let step = Math.PI / spikes;
        ctx.beginPath();
        ctx.moveTo(cx, cy - outerRadius);
        for (let i = 0; i < spikes; i++) {
            ctx.lineTo(cx + Math.cos(rot) * outerRadius, cy + Math.sin(rot) * outerRadius);
            rot += step;
            ctx.lineTo(cx + Math.cos(rot) * innerRadius, cy + Math.sin(rot) * innerRadius);
            rot += step;
        }
        ctx.lineTo(cx, cy - outerRadius);
        ctx.closePath();
        ctx.fillStyle = '#FFD700';
        ctx.fill();
    }

    function update() {
        if (!gameActive || isWon) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        updateSignal();
        
        // Рисуем спутник
        ctx.drawImage(satelliteImg, signal.x - 40, signal.y - 40, 80, 80);

        const dist = Math.hypot(mouse.x - signal.x, mouse.y - signal.y);

        if (dist < signal.currentRadius) {
            progress += 0.45;
            statusText.innerText = "СТАБИЛИЗАЦИЯ: " + Math.floor(progress) + "%";
            statusText.style.color = "#00ffcc";
            ctx.strokeStyle = "white";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "white";
        } else {
            if (progress > 0) progress -= 0.12;
            statusText.innerText = "СИГНАЛ НЕСТАБИЛЕН";
            statusText.style.color = "#e94560";
            ctx.strokeStyle = "#00ffcc";
            ctx.shadowBlur = 0;
        }

        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(signal.x, signal.y, signal.currentRadius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Прицел игрока
        ctx.strokeStyle = "#e94560";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(mouse.x - 20, mouse.y); ctx.lineTo(mouse.x + 20, mouse.y);
        ctx.moveTo(mouse.x, mouse.y - 20); ctx.lineTo(mouse.x, mouse.y + 20);
        ctx.stroke();

        progressBar.style.width = Math.min(progress, 100) + "%";

        if (progress >= 100) {
            isWon = true;
            gameActive = false;
            showVictory();
        } else {
            requestAnimationFrame(update);
        }
    }

    function showVictory() {
        overlay.classList.remove('hidden');
        startContent.classList.add('hidden');
        victoryContent.classList.remove('hidden');
        
        // Отрисовка звезд на канвасе после победы
        ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        const centerX = canvas.width / 2;
        drawStar(centerX - 60, 150, 5, 20, 10);
        drawStar(centerX, 130, 5, 25, 12);
        drawStar(centerX + 60, 150, 5, 20, 10);
    }
</script>

</body>
</html>
